<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#0d3b56"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo: diamond node cluster -->
  <g transform="translate(280, 315)">
    <polygon points="0,-40 30,0 0,40 -30,0" fill="#c8963e" opacity="0.95"/>
    <polygon points="-120,-100 -100,-120 -80,-100 -100,-80" fill="none" stroke="#c8963e" stroke-width="2" opacity="0.8"/>
    <polygon points="120,-100 140,-120 160,-100 140,-80" fill="none" stroke="#c8963e" stroke-width="2" opacity="0.8"/>
    <polygon points="0,160 -20,140 0,120 20,140" fill="none" stroke="#c8963e" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="-40" x2="-100" y2="-100" stroke="#c8963e" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-40" x2="100" y2="-100" stroke="#c8963e" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="40" x2="0" y2="120" stroke="#c8963e" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Divider -->
  <line x1="560" y1="126" x2="560" y2="504" stroke="#c8963e" stroke-width="2" opacity="0.5"/>

  <!-- Text -->
  <g transform="translate(600, 220)">
    <text x="0" y="0" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.5" fill="#ffffff">
      AAAI <tspan fill="#c8963e">Writing</tspan> Skill
    </text>
    <text x="0" y="48" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.78)" letter-spacing="0.2">
      AI-powered structured writing system for AAAI 2027
    </text>
    <rect x="0" y="76" width="56" height="3" rx="1.5" fill="#c8963e" opacity="0.8"/>
    <g transform="translate(0, 118)">
      <text x="0" y="0" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#c8963e">◆</text>
      <text x="26" y="0" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">50</text>
      <text x="50" y="0" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.82)"> award-winning papers distilled</text>
      <text x="0" y="34" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#c8963e">◆</text>
      <text x="26" y="34" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">5-phase</text>
      <text x="94" y="34" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.82)"> orchestrated workflow</text>
      <text x="0" y="68" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#c8963e">◆</text>
      <text x="26" y="68" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">4</text>
      <text x="38" y="68" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.82)"> paper-type specializations</text>
    </g>
  </g>

  <!-- Bottom URL bar -->
  <text x="600" y="590" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" text-anchor="middle">github.com / aaai-writing  ·  Claude Code Skill</text>
</svg>
