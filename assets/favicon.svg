  <!-- Connecting lines -->
  <line x1="12" y1="16" x2="7" y2="6" stroke="#c8963e" stroke-width="0.8" opacity="0.7"/>
  <line x1="20" y1="16" x2="25" y2="6" stroke="#c8963e" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#c8963e" stroke-width="0.8" opacity="0.7"/>
