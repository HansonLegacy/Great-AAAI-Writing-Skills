name: Markdown Lint

on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: '.markdownlint.yaml'
          globs: |
            *.md
            sections/*.md
            modules/*.md
            modules/review/*.md
            modules/review-simulator/*.md
            paper-types/*.md
            docs/*.md
